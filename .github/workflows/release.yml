name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o jike-mcp-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jike-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: jike-mcp-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package skills
        run: |
          tar czf jike-skills.tar.gz SKILL.md skills/ README.md LICENSE

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/jike-mcp-linux-amd64/jike-mcp-linux-amd64
            artifacts/jike-mcp-linux-arm64/jike-mcp-linux-arm64
            artifacts/jike-mcp-darwin-amd64/jike-mcp-darwin-amd64
            artifacts/jike-mcp-darwin-arm64/jike-mcp-darwin-arm64
            jike-skills.tar.gz
